<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.2);
            padding: 50px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn {
            background: white;
            color: #0984e3;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
        }

        .btn:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎉 我的个人网站</h1>
        <p>这是我用 GitHub Pages 免费搭建的网站</p>
       <a class="btn" href="about.html">了解更多关于我</a>
    </div>
</body>
</html>
